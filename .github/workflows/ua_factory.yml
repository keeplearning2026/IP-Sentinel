name: Automated Massive UA Factory

on:
  schedule:
    # 每个月 1 号凌晨 04:00 执行
    - cron: '0 4 1 * *'
  workflow_dispatch: # 允许手动点击运行

concurrency:
  group: data-factory-main
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限，否则无法更新仓库文件
      
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: ⚙️ Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🚀 Run UA Factory Generator
      run: python scripts/ua_generator.py

    - name: 📤 Commit and Push to Main
      env:
        TARGET_BRANCH: main
      run: |
        set -euo pipefail

        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add data/user_agents.txt

        # 只有在文件内容确实发生变化时才执行提交
        if git diff --staged --quiet; then
          echo "No changes, skipping."
          exit 0
        fi

        git commit -m "chore(data): 🤖 自动机兵：刷新 4000 条绝对坐标指纹库"

        # 远端可能在 rebase 和 push 之间再次前进，重试可以自动追上最新 main
        for attempt in 1 2 3 4 5; do
          git fetch origin "${TARGET_BRANCH}"
          git rebase "origin/${TARGET_BRANCH}"

          if git push origin "HEAD:${TARGET_BRANCH}"; then
            exit 0
          fi

          echo "Push failed on attempt ${attempt}; retrying after refetch..."
          sleep $((attempt * 5))
        done

        echo "Push failed after 5 attempts."
        exit 1
