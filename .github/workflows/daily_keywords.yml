name: Daily Data Factory

on:
  schedule:
    # 每天 UTC 03:00 执行，为各节点全天随机拉取准备好弹药
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: data-factory-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Trends Engine (搜索词库)
        run: python scripts/fetch_trends.py

      - name: Commit and Push All Data
        env:
          TARGET_BRANCH: main
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 一揽子添加搜索词库和地区白名单的变化
          git add data/keywords/

          # 防御机制：如果没有新数据，就静默退出，不产生空提交
          if git diff --staged --quiet; then
            echo "No changes, skipping."
            exit 0
          fi

          # 策略：将两路数据的更新合并为一个原子提交
          git commit -m "chore(data): 🤖 自动同步全战区搜索词库 [$(date +'%Y-%m-%d')]"

          # 远端可能在 rebase 和 push 之间再次前进，重试可以自动追上最新 main
          for attempt in 1 2 3 4 5; do
            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}"

            if git push origin "HEAD:${TARGET_BRANCH}"; then
              exit 0
            fi

            echo "Push failed on attempt ${attempt}; retrying after refetch..."
            sleep $((attempt * 5))
          done

          echo "Push failed after 5 attempts."
          exit 1
